name: Logging Sync

on:
  schedule:
    # Daily at 6:00 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: logging-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Sync Sentry errors (no AI)
        run: pnpm logging:sentry --no-ai
        env:
          SENTRY_AUTH_TOKEN_LOCAL_DEVELOPMENT: ${{ secrets.SENTRY_AUTH_TOKEN_LOCAL_DEVELOPMENT }}

      - name: Scan TODOs
        run: pnpm logging:todos

      - name: Analyze architecture
        run: pnpm logging:arch

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logging/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(logging): daily sync — errors, todos, architecture"
            git push
          fi
