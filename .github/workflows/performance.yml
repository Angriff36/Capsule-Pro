name: Performance

# Nightly only — Lighthouse is advisory (Clerk auth interstitial breaks
# unauthenticated runs) and bundle-analysis is artifact-only. Per-PR runs
# wasted CI minutes without gating anything.
on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm/action-setup must come before actions/setup-node when cache: pnpm
      # is used — setup-node invokes pnpm to compute the cache key.
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Build app for production
        run: cd apps/app && pnpm run build
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          # CLERK_SECRET_KEY intentionally not set — SKIP_ENV_VALIDATION=true
          # bypasses zod parsing (packages/auth/keys.ts declares it .optional()),
          # and the Clerk SDK falls back to "" when absent. Lighthouse and
          # bundle-analysis don't exercise authenticated runtime paths.
          # Matches deploy.yml convention (see CI-drain Task 12 / 12b).

      - name: Start app server
        run: |
          cd apps/app && pnpm start &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3000/ 2>/dev/null; then
              echo "App server ready on port 3000"
              exit 0
            fi
            sleep 2
          done
          echo "::error::App server failed to start within 60s"
          exit 1
        env:
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          # CLERK_SECRET_KEY intentionally not set — SKIP_ENV_VALIDATION=true
          # bypasses zod parsing (packages/auth/keys.ts declares it .optional()),
          # and the Clerk SDK falls back to "" when absent. Lighthouse and
          # bundle-analysis don't exercise authenticated runtime paths.
          # Matches deploy.yml convention (see CI-drain Task 12 / 12b).
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"

      - name: Run Lighthouse
        continue-on-error: true # Clerk auth middleware returns interstitial for unauthenticated requests
        uses: treosh/lighthouse-ci-action@03becbfc543944dd6e7534f7ff768abb8a296826 # v10
        with:
          urls: |
            http://localhost:3000
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          # CLERK_SECRET_KEY intentionally not set — SKIP_ENV_VALIDATION=true
          # bypasses zod parsing (packages/auth/keys.ts declares it .optional()),
          # and the Clerk SDK falls back to "" when absent. Lighthouse and
          # bundle-analysis don't exercise authenticated runtime paths.
          # Matches deploy.yml convention (see CI-drain Task 12 / 12b).

  bundle-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm/action-setup must come before actions/setup-node when cache: pnpm
      # is used — setup-node invokes pnpm to compute the cache key.
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Build app with bundle analyzer
        run: cd apps/app && pnpm run build
        env:
          ANALYZE: true
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          # CLERK_SECRET_KEY intentionally not set — SKIP_ENV_VALIDATION=true
          # bypasses zod parsing (packages/auth/keys.ts declares it .optional()),
          # and the Clerk SDK falls back to "" when absent. Lighthouse and
          # bundle-analysis don't exercise authenticated runtime paths.
          # Matches deploy.yml convention (see CI-drain Task 12 / 12b).

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: apps/app/.next/static/chunks/
          retention-days: 30
