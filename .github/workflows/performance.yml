name: Performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"

permissions:
  contents: read
  packages: read

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Build app for production
        run: cd apps/app && pnpm run build
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          CLERK_SECRET_KEY: "sk_test_dummy"

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3000
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  bundle-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Build app with bundle analyzer
        run: cd apps/app && pnpm run build
        env:
          ANALYZE: true
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          CLERK_SECRET_KEY: "sk_test_dummy"

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: apps/app/.next/static/chunks/
          retention-days: 30
