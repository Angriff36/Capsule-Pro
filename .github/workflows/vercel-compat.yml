name: Vercel-Compat Build

on:
  push:
    branches: [preview, main, develop]
  pull_request:
    branches: [preview, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: read

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  build:
    name: Vercel-Compatible Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x" # Match Vercel's engine requirement
          cache: "pnpm"

      - name: Show toolchain
        run: node -v && pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Build with Turbo (exactly like Vercel)
        run: pnpm turbo run build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          # Match Vercel's minimal env approach
          SKIP_ENV_VALIDATION: true
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          # Required public env vars for Next.js builds
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          # Server env vars needed for full turbo build
          CLERK_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          CLERK_WEBHOOK_SECRET: "webhook_secret_placeholder"
          RESEND_FROM: "noreply@ci-build.local"
          RESEND_TOKEN: "re_dummy"
          STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
          BETTERSTACK_API_KEY: "dummy"
          BETTERSTACK_URL: "https://dummy.betterstack.com"
          FLAGS_SECRET: "dummy"
          ARCJET_KEY: "ajkey_dummy"
          SVIX_TOKEN: "api_key_placeholder"
          LIVEBLOCKS_SECRET: "api_key_placeholder"
          VERCEL_PROJECT_PRODUCTION_URL: "https://capsule-pro-app.vercel.app"
          KNOCK_API_KEY: "dummy"
          KNOCK_FEED_CHANNEL_ID: "dummy"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: "/"
          NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: "/"
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: "/"
          NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL: "/"
          NEXT_PUBLIC_GA_MEASUREMENT_ID: "G-DUMMY"
          NEXT_PUBLIC_ABLY_AUTH_URL: "https://capsule-pro-api.vercel.app/ably/auth"
