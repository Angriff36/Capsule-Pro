  manifest-route-audit:
    name: Route Boundary Audit (Strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Order matters: pnpm/action-setup MUST come before actions/setup-node when
      # cache: pnpm is used. setup-node invokes pnpm to compute the cache key
      # and fails with "Unable to locate executable file: pnpm" if pnpm isn't
      # on PATH yet. See https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Run route boundary audit (reporting)
        # STAGED GATE — currently reports 175 ownership errors / 479 total
        # against the kitchen subset (2026-05-22 baseline). Was strict-blocking
        # but has been silently red on path-filtered runs. Pointing at the
        # kitchen subset because audit-routes' --commands-manifest flag only
        # accepts a flat array; the canonical manifest-registry/commands.json
        # uses the wrapped {irHash, compilerVersion, commands} envelope.
        # Flip --strict back on (and remove continue-on-error) when ownership
        # error count drops to 0 or unresolved cases are added to the
        # exemptions registry at packages/manifest-ir/ir/kitchen/audit-routes-exemptions.json.
        continue-on-error: true
        run: |
          echo "Running route boundary audit (reporting; not blocking)..."
          pnpm exec manifest audit-routes \
            --strict \
            --root apps/api \
            --commands-manifest packages/manifest-ir/ir/kitchen/kitchen.commands.json \
            --exemptions packages/manifest-ir/ir/kitchen/audit-routes-exemptions.json
          echo
          echo "::notice::audit-routes findings above are advisory until ownership errors are resolved or exempted."

  manifest-registry-drift:
    name: Governance Registry Drift Check
    # BLOCKING — proves the committed manifest/governance/{commands,entities}.json
    # match the registries that the CURRENT manifest sources would produce.
    # If a manifest source under packages/manifest-adapters/manifests/ changes
    # but neither kitchen.ir.json nor the governance registries are regenerated
    # and committed, governance audits would run against stale data.
    #
    # Flow:
    #   1. `manifest:compile` re-derives kitchen.ir.json (and siblings) from
    #      the .manifest sources. Without this step, step 2 would consume the
    #      committed (possibly stale) IR and could produce a false green:
    #      stale-IR-in, stale-registry-out, matches stale-committed-registry.
    #   2. `manifest:registries` emits manifest/governance/{commands,entities}.json
    #      from the fresh IR.
    #   3. `git diff` against the committed registries fails if either differs.
    #
    # We do NOT diff packages/manifest-ir/ir/kitchen/ directly because
    # scripts/manifest/compile.mjs stamps a fresh `compiledAt` ISO into the
    # IR + provenance on every run, so a naive diff would always fire.
    # The downstream commands/entities registries are timestamp-free derivations
    # of the IR's substantive content, so they are the correct drift surface.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Order matters: pnpm/action-setup MUST come before actions/setup-node when
      # cache: pnpm is used. setup-node invokes pnpm to compute the cache key
      # and fails with "Unable to locate executable file: pnpm" if pnpm isn't
      # on PATH yet. See https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Compile manifest IR
        # Re-derive kitchen.ir.json from .manifest sources so the next step
        # emits registries from the CURRENT source-of-truth IR — not from
        # whatever IR was last committed. See header comment for rationale.
        run: pnpm manifest:compile

      - name: Re-emit governance registries
        run: pnpm manifest:registries

      - name: Verify no drift
        run: |
          if ! git diff --exit-code manifest/governance/commands.json manifest/governance/entities.json; then
            echo "::error::manifest/governance registries are stale."
            echo "Run 'pnpm manifest:compile && pnpm manifest:registries' locally and commit the result."
            exit 1
          fi
          echo "Governance registries are in sync with IR."

  quarantine-baseline:
    name: Quarantine Baseline Check
    # BLOCKING — fails if any new `*.quarantine.test.ts` files appear in the
    # tree beyond the count recorded in ci/quarantine-baseline.json.
    # Per ci/DRAIN.md, the only allowed direction is DOWN: fix tests and
    # remove them from quarantine; do not add new ones.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Verify no new quarantined tests
        run: node ci/check-quarantine-baseline.mjs

  manifest-bypass-audit:
