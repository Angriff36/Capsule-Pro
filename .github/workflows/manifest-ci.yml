name: Manifest CI

on:
  # Path filters removed: governance gates (audit-governance, audit-bypasses,
  # integration-check, enforce-surface) must observe ANY source change, not
  # only changes under manifest paths. A handler edit elsewhere in apps/api
  # can introduce a bypass that needs surfacing.
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      snapcheck:
        description: "Run snapshot check mode (fail if snapshots out of date)"
        required: false
        type: boolean
        default: false

concurrency:
  group: manifest-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  # Turbo remote cache credentials. turbo.json declares
  # `remoteCache: { enabled: true, signature: true }` plus the three vars in
  # `globalPassThroughEnv`. Without these wired into the workflow env, each
  # parallel `pnpm turbo run analyze` job (manifest-codegen-check,
  # manifest-typescript-check, manifest-tests, snapshot-check) is a cache
  # miss. Fork PRs and Dependabot do NOT receive repo secrets — the
  # references resolve to empty strings and turbo silently falls back to
  # local-only cache (verified locally with all three unset).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  manifest-validate:
    name: Validate Manifest Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Order matters: pnpm/action-setup MUST come before actions/setup-node when
      # cache: pnpm is used. setup-node invokes pnpm to compute the cache key
      # and fails with "Unable to locate executable file: pnpm" if pnpm isn't
      # on PATH yet. See https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Validate all manifest files compile
        run: |
          echo "Validating manifest files..."
          pnpm manifest:compile

          echo "All manifest files validated successfully"

      # Kitchen conformance test run moved to the dedicated `manifest-tests` job
      # below to avoid duplication. That job also excludes DB-dependent tests
      # (prep-tasks.test.ts) since this CI tier has no Postgres service.

  manifest-codegen-check:
    name: Check Generated Code Is Up-to-Date
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Order matters: pnpm/action-setup MUST come before actions/setup-node when
      # cache: pnpm is used. setup-node invokes pnpm to compute the cache key
      # and fails with "Unable to locate executable file: pnpm" if pnpm isn't
      # on PATH yet. See https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Generate code (Prisma, etc.)
        # Scope analyze away from apps/web + @repo/cms — their analyze step
        # builds basehub types from the live CMS, and CI's BASEHUB_TOKEN
        # points at a different branch than local dev (documented as
        # environment-dependent in manifest-typescript-check). The
        # manifest gates don't need basehub types — only Prisma + manifest
        # codegen.
        run: |
          pnpm turbo run analyze --filter=!web --filter=!@repo/cms
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          SKIP_ENV_VALIDATION: true
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          # Server env vars needed for api build (SDK constructors throw without keys)
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          # CLERK_SECRET_KEY intentionally not set — SKIP_ENV_VALIDATION=true
          # bypasses zod parsing (packages/auth/keys.ts declares it .optional()),
          # and the Clerk SDK falls back to "" when absent. CI jobs here don't
          # exercise authenticated runtime paths. Matches deploy.yml convention
          # (see CI-drain Task 12 / 12b).
          STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
          SVIX_TOKEN: "api_key_placeholder"
          KNOCK_API_KEY: "dummy"
          KNOCK_FEED_CHANNEL_ID: "dummy"
          BETTERSTACK_API_KEY: "dummy"
          BETTERSTACK_URL: "https://dummy.betterstack.com"
          FLAGS_SECRET: "dummy"
          ARCJET_KEY: "ajkey_dummy"
          LIVEBLOCKS_SECRET: "api_key_placeholder"

      - name: Check if generated code differs
        run: |
          echo "Checking if generated code is up-to-date..."

          # Exclude environment-dependent generated files:
          # - basehub-types.d.ts: regenerated against CI's BASEHUB_TOKEN branch
          #   (different from local dev); content drift is environment, not code.
          # - .npmrc: regenerated by scripts/ensure-github-packages-npmrc.sh in
          #   the install step with the CI runner's auth token; 2-line drift on
          #   every run.
          git checkout -- '**/basehub-types.d.ts' 2>/dev/null || true
          git checkout -- '.npmrc' 2>/dev/null || true

          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Please run 'pnpm run analyze' locally and commit the changes."
            echo ""
            echo "The following files have uncommitted changes after code generation:"
            git diff --name-only
            echo ""
            echo "Diff summary:"
            git diff --stat
            exit 1
          fi

          echo "Generated code is up-to-date"

