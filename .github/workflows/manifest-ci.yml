name: Manifest CI

on:
  # Path filters removed: governance gates (audit-governance, audit-bypasses,
  # integration-check, enforce-surface) must observe ANY source change, not
  # only changes under manifest paths. A handler edit elsewhere in apps/api
  # can introduce a bypass that needs surfacing.
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      snapcheck:
        description: "Run snapshot check mode (fail if snapshots out of date)"
        required: false
        type: boolean
        default: false

concurrency:
  group: manifest-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  manifest-validate:
    name: Validate Manifest Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Validate all manifest files compile
        run: |
          echo "Validating manifest files..."
          pnpm manifest:compile

          echo "All manifest files validated successfully"

      - name: Check manifest conformance tests
        run: |
          echo "Running manifest conformance tests..."
          cd apps/api
          pnpm test __tests__/kitchen/ -- --run
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

  manifest-codegen-check:
    name: Check Generated Code Is Up-to-Date
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Generate code (Prisma, etc.)
        run: |
          pnpm run analyze
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          SKIP_ENV_VALIDATION: true
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          # Server env vars needed for api build (SDK constructors throw without keys)
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          CLERK_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
          SVIX_TOKEN: "api_key_placeholder"
          KNOCK_API_KEY: "dummy"
          KNOCK_FEED_CHANNEL_ID: "dummy"
          BETTERSTACK_API_KEY: "dummy"
          BETTERSTACK_URL: "https://dummy.betterstack.com"
          FLAGS_SECRET: "dummy"
          ARCJET_KEY: "ajkey_dummy"
          LIVEBLOCKS_SECRET: "api_key_placeholder"

      - name: Check if generated code differs
        run: |
          echo "Checking if generated code is up-to-date..."

          # Exclude environment-dependent generated files (basehub types depend on CI token)
          git checkout -- '**/basehub-types.d.ts' 2>/dev/null || true

          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Please run 'pnpm run analyze' locally and commit the changes."
            echo ""
            echo "The following files have uncommitted changes after code generation:"
            git diff --name-only
            echo ""
            echo "Diff summary:"
            git diff --stat
            exit 1
          fi

          echo "Generated code is up-to-date"

  manifest-typescript-check:
    name: TypeScript Compilation Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Generate code (Prisma, etc.)
        run: |
          pnpm run analyze
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          SKIP_ENV_VALIDATION: true
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          CLERK_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
          SVIX_TOKEN: "api_key_placeholder"
          KNOCK_API_KEY: "dummy"
          KNOCK_FEED_CHANNEL_ID: "dummy"
          BETTERSTACK_API_KEY: "dummy"
          BETTERSTACK_URL: "https://dummy.betterstack.com"
          FLAGS_SECRET: "dummy"
          ARCJET_KEY: "ajkey_dummy"
          LIVEBLOCKS_SECRET: "api_key_placeholder"

      - name: Type check all packages
        run: |
          echo "Running TypeScript type check..."
          # Exclude @repo/cms and apps that depend on it — basehub types are environment-dependent
          # (CI token points to a different basehub branch than local dev, causing schema drift).
          pnpm -r --filter='!@repo/cms' --filter='!web' --filter='!app' run typecheck
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

  manifest-tests:
    name: Manifest Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Generate code (Prisma, etc.)
        run: |
          pnpm run analyze
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          SKIP_ENV_VALIDATION: true
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          CLERK_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
          SVIX_TOKEN: "api_key_placeholder"
          KNOCK_API_KEY: "dummy"
          KNOCK_FEED_CHANNEL_ID: "dummy"
          BETTERSTACK_API_KEY: "dummy"
          BETTERSTACK_URL: "https://dummy.betterstack.com"
          FLAGS_SECRET: "dummy"
          ARCJET_KEY: "ajkey_dummy"
          LIVEBLOCKS_SECRET: "api_key_placeholder"

      - name: Run manifest integration tests
        run: |
          echo "Running manifest integration tests..."
          cd apps/api
          pnpm test __tests__/kitchen/ -- --run
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            apps/api/coverage/
            apps/api/.vitest/
          retention-days: 7

  manifest-route-audit:
    name: Route Boundary Audit (Strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Run route boundary audit (reporting)
        # STAGED GATE — currently reports 175 ownership errors / 479 total
        # against the kitchen subset (2026-05-22 baseline). Was strict-blocking
        # but has been silently red on path-filtered runs. Pointing at the
        # kitchen subset because audit-routes' --commands-manifest flag only
        # accepts a flat array; the canonical manifest-registry/commands.json
        # uses the wrapped {irHash, compilerVersion, commands} envelope.
        # Flip --strict back on (and remove continue-on-error) when ownership
        # error count drops to 0 or unresolved cases are added to the
        # exemptions registry at packages/manifest-ir/ir/kitchen/audit-routes-exemptions.json.
        continue-on-error: true
        run: |
          echo "Running route boundary audit (reporting; not blocking)..."
          pnpm exec manifest audit-routes \
            --strict \
            --root apps/api \
            --commands-manifest packages/manifest-ir/ir/kitchen/kitchen.commands.json \
            --exemptions packages/manifest-ir/ir/kitchen/audit-routes-exemptions.json
          echo
          echo "::notice::audit-routes findings above are advisory until ownership errors are resolved or exempted."

  manifest-registry-drift:
    name: Governance Registry Drift Check
    # BLOCKING — proves the committed manifest/governance/{commands,entities}.json
    # match the current IR. If a manifest source changes but the registries
    # aren't regenerated and committed, governance audits would run against
    # stale data. Producer: `pnpm manifest:registries`.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Re-emit governance registries
        run: pnpm manifest:registries

      - name: Verify no drift
        run: |
          if ! git diff --exit-code manifest/governance/commands.json manifest/governance/entities.json; then
            echo "::error::manifest/governance registries are stale."
            echo "Run 'pnpm manifest:registries' locally and commit the result."
            exit 1
          fi
          echo "Governance registries are in sync with IR."

  manifest-bypass-audit:
    name: Bypass Registry Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Validate bypasses.json schema + expiry
        # BLOCKING — bypasses.json is small, schema validation is cheap, and
        # an invalid bypass registry would silently disable governance checks.
        run: pnpm exec manifest audit-bypasses --registry manifest/governance/bypasses.json --strict-expiry

  manifest-governance-audit:
    name: Governance Audit (Reporting)
    # STAGED GATE — 2026-05-22 baseline: 577 errors, dominated by
    # MISSING_CONFORMANCE_TEST for governed commands without a fixture under
    # apps/api/__tests__/. Detectors enabled: direct-writes, event-fabrication,
    # route-drift, missing-tests, bypass-violations.
    # Flip to --strict (and remove continue-on-error) when the conformance
    # test backlog clears or governed-but-untested commands have explicit
    # bypass-registry entries.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Run governance audit (reporting)
        continue-on-error: true
        run: |
          echo "Running manifest audit-governance (reporting; not blocking)..."
          # Paths resolve relative to --root, hence the ../.. prefix.
          pnpm exec manifest audit-governance \
            -r apps/api \
            --commands-registry ../../manifest/governance/commands.json \
            --bypass-registry ../../manifest/governance/bypasses.json
          echo
          echo "::notice::audit-governance findings above are advisory until conformance-test or bypass backlog clears."

  manifest-integration-check:
    name: Integration Check (Reporting)
    # STAGED GATE — wraps governance + bypass + dispatcher + runtime-smoke +
    # package-shape. Last three sub-checks pass locally; governance fails on
    # the same 577 findings as the governance-audit gate. Flips blocking when
    # governance flips blocking.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Run integration-check (reporting)
        # integration-check resolves registry paths relative to cwd, not --root.
        continue-on-error: true
        run: |
          echo "Running manifest integration-check (reporting; not blocking)..."
          pnpm exec manifest integration-check \
            --root apps/api \
            --commands-registry manifest/governance/commands.json \
            --bypass-registry manifest/governance/bypasses.json
          echo
          echo "::notice::integration-check findings above are advisory until governance backlog clears."

  manifest-enforce-surface:
    # Reporting gate (not blocking). Runs `manifest enforce-surface` so
    # contributors see when their changes introduce a new duplicate or bypass
    # write path against the Manifest command registry. Flip `continue-on-error`
    # to `false` (and add `--strict`) once raw SQL / $executeRaw detection
    # exists upstream and the known 30 findings are either fixed or have
    # bypass-registry entries.
    name: Enforce Surface (Reported)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Run enforce-surface (reporting only)
        # NOTE: --commands-registry points at the kitchen-scope runtime sidecar
        # (packages/manifest-ir/dist/commands.registry.json), not the full
        # governance registry. This is intentional — enforce-surface checks
        # whether app code writes through registered commands, and the dispatcher
        # currently only resolves kitchen commands. Switching to the full
        # governance registry would surface non-kitchen routes as drift, which
        # is true but already reported by audit-routes. See
        # docs/audits/manifest-artifact-layout-adr.md.
        continue-on-error: true
        run: |
          echo "Running manifest enforce-surface (reporting; not blocking)..."
          pnpm exec manifest enforce-surface \
            --root . \
            --commands-registry packages/manifest-ir/dist/commands.registry.json \
            --bypass-registry manifest/governance/bypasses.json \
            --format text
          echo
          echo "::notice::enforce-surface findings above are advisory until raw-SQL detection lands and known violations are exempted."

  snapshot-check:
    name: Snapshot Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.snapcheck == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Generate code (Prisma, etc.)
        run: |
          pnpm run analyze
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          SKIP_ENV_VALIDATION: true
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
          NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
          NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
          NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
          RESEND_TOKEN: "re_dummy"
          RESEND_FROM: "noreply@ci-build.local"
          CLERK_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
          STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
          SVIX_TOKEN: "api_key_placeholder"
          KNOCK_API_KEY: "dummy"
          KNOCK_FEED_CHANNEL_ID: "dummy"
          BETTERSTACK_API_KEY: "dummy"
          BETTERSTACK_URL: "https://dummy.betterstack.com"
          FLAGS_SECRET: "dummy"
          ARCJET_KEY: "ajkey_dummy"
          LIVEBLOCKS_SECRET: "api_key_placeholder"

      - name: Check snapshot tests
        run: |
          echo "Running snapshot tests in check mode..."
          cd apps/api
          pnpm test __tests__/kitchen/manifest-projection-snapshot.test.ts -- --run
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Verify no snapshot changes
        run: |
          if git diff --name-only | grep -q "__snapshots__\|\.snap"; then
            echo "::error::Snapshot tests are out of date. Please update snapshots locally by running:"
            echo "  cd apps/api && pnpm test __tests__/kitchen/manifest-projection-snapshot.test.ts -u"
            echo ""
            echo "Changed snapshot files:"
            git diff --name-only
            exit 1
          fi

          echo "All snapshots are up-to-date"
