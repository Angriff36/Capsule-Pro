name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Sundays
    - cron: "0 0 * * 0"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  security-events: write

env:
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm/action-setup must come before actions/setup-node when cache: pnpm
      # is used — setup-node invokes pnpm to compute the cache key.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

      - name: Run pnpm audit (baseline-and-block-new)
        # 144 pre-existing moderate+ advisories at 2026-05-22 (mostly transitive
        # through @stripe/agent-toolkit, langchain, clerk-expo). Bumping the
        # whole tree in one PR is impractical. Baseline lives at
        # manifest/governance/baselines/pnpm-audit.json. Wrapper fails CI on
        # any NEW (advisoryId, moduleName) pair not in the baseline; existing
        # debt is grandfathered. Regenerate baseline with
        # `pnpm security:audit-baseline:save` only after intentionally
        # accepting a new set (e.g. just bumped a dep).
        run: pnpm security:audit-baseline

      - name: Run secretlint
        run: pnpm secrets:scan

      # CodeQL analysis lives in .github/workflows/codeql.yml — do not duplicate here.

      - name: Run Trivy vulnerability scanner
        # SHA-pinned to the v0.36.0 release commit (signed tag verified on
        # 2026-04-22 by maintainer Nikita Pivkin). Earlier attempt at version
        # tag "0.30.0" (no `v` prefix) was never published and broke this job;
        # the SHA pin avoids both the supply-chain risk of @master and the
        # rename/missing-tag drift that bit us before. Dependabot's
        # github-actions ecosystem (.github/dependabot.yml) keeps this current.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: "trivy-results.sarif"
