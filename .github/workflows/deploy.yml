name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-manual
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  INFISICAL_DISABLE_UPDATE_CHECK: "true"
  INFISICAL_ENV: prod
  INFISICAL_SHARED_PATH: /apps/capsule-pro/shared

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      INFISICAL_TARGET_PATH: /apps/capsule-pro/app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install CLIs
        run: npm install -g @infisical/cli vercel@53.1.0

      - name: Verify Infisical access
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_PROJECT_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_ORG_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_TOKEN >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv NPM_TOKEN >/dev/null

      - name: Install dependencies
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            bash scripts/ensure-github-packages-npmrc.sh
            pnpm install --frozen-lockfile
          '

      - name: Deploy app to Vercel
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            cd apps/app
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
            vercel build --prod --token "$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
          '

  deploy-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      INFISICAL_TARGET_PATH: /apps/capsule-pro/api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install CLIs
        run: npm install -g @infisical/cli vercel@53.1.0

      - name: Verify Infisical access
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_PROJECT_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_ORG_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_TOKEN >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv NPM_TOKEN >/dev/null

      - name: Install dependencies
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            bash scripts/ensure-github-packages-npmrc.sh
            pnpm install --frozen-lockfile
          '

      - name: Deploy api to Vercel
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            cd apps/api
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
            vercel build --prod --token "$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
          '

  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      INFISICAL_TARGET_PATH: /apps/capsule-pro/docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install CLIs
        run: npm install -g @infisical/cli vercel@53.1.0

      - name: Verify Infisical access
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_PROJECT_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_ORG_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_TOKEN >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv NPM_TOKEN >/dev/null

      - name: Install dependencies
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            bash scripts/ensure-github-packages-npmrc.sh
            pnpm install --frozen-lockfile
          '

      - name: Deploy docs to Vercel
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            cd apps/docs
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
            vercel build --prod --token "$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
          '

  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      INFISICAL_TARGET_PATH: /apps/capsule-pro/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install CLIs
        run: npm install -g @infisical/cli vercel@53.1.0

      - name: Verify Infisical access
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_PROJECT_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_ORG_ID >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv VERCEL_TOKEN >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv NPM_TOKEN >/dev/null
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- printenv BASEHUB_TOKEN >/dev/null

      - name: Install dependencies
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            bash scripts/ensure-github-packages-npmrc.sh
            pnpm install --frozen-lockfile
          '

      - name: Generate CMS code
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            pnpm --filter @repo/cms build
            cd apps/web
            npx basehub
          '

      - name: Deploy web to Vercel
        run: |
          infisical run --projectId=d8319856-8caf-4c22-8717-57ab28b326b3 --env="$INFISICAL_ENV" --path="$INFISICAL_TARGET_PATH" --path="$INFISICAL_SHARED_PATH" -- bash -lc '
            cd apps/web
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
            vercel build --prod --token "$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
          '
