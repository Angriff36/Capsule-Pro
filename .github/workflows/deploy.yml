name: Deploy

# Production only when you explicitly run this workflow (Actions → Deploy → Run workflow).
# Git pushes do not deploy. Vercel Git integration builds are skipped via ignoreCommand in each vercel.json.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production-manual
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  check-dependabot:
    runs-on: ubuntu-latest
    outputs:
      has-failing-dependabot: ${{ steps.check.outputs.has-failing }}

    steps:
      - name: Check for failing Dependabot PRs
        id: check
        run: |
          # Check if there are any open Dependabot PRs with failing checks
          FAILING_PRS=$(gh pr list --author dependabot[bot] --json statusCheckRollup --jq '.[] | select(.statusCheckRollup[]?.status == "FAILURE" or .statusCheckRollup[]?.status == "ERROR") | .number' || echo "")

          if [ -n "$FAILING_PRS" ]; then
            echo "has-failing=true" >> $GITHUB_OUTPUT
            echo "⚠️ Found failing Dependabot PRs: $FAILING_PRS"
          else
            echo "has-failing=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

  deploy-app-api-web:
    runs-on: ubuntu-latest
    needs: check-dependabot
    if: needs.check-dependabot.outputs.has-failing-dependabot == 'false'
    env:
      NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
      SKIP_ENV_VALIDATION: true
      NODE_OPTIONS: "--max-old-space-size=8192"
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
      CLERK_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
      CLERK_WEBHOOK_SECRET: "webhook_secret_placeholder"
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2kuZHVtbXkuYWNjb3VudHMuZGV2JA=="
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: "/"
      NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: "/"
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: "/"
      NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL: "/"
      RESEND_FROM: "noreply@ci-build.local"
      RESEND_TOKEN: "re_dummy"
      STRIPE_SECRET_KEY: "not_a_real_stripe_key_dummy_value"
      STRIPE_WEBHOOK_SECRET: "webhook_secret_placeholder"
      BETTERSTACK_API_KEY: "dummy"
      BETTERSTACK_URL: "https://dummy.betterstack.com"
      FLAGS_SECRET: "dummy"
      ARCJET_KEY: "ajkey_dummy"
      SVIX_TOKEN: "api_key_placeholder"
      LIVEBLOCKS_SECRET: "api_key_placeholder"
      VERCEL_PROJECT_PRODUCTION_URL: "https://capsule-pro-app.vercel.app"
      KNOCK_API_KEY: "dummy"
      KNOCK_FEED_CHANNEL_ID: "dummy"
      NEXT_PUBLIC_GA_MEASUREMENT_ID: "G-DUMMY"
      NEXT_PUBLIC_POSTHOG_KEY: "phc_dummy"
      NEXT_PUBLIC_POSTHOG_HOST: "https://app.posthog.com"
      NEXT_PUBLIC_APP_URL: "https://capsule-pro-app.vercel.app"
      NEXT_PUBLIC_WEB_URL: "https://capsule-pro-web.vercel.app"
      NEXT_PUBLIC_API_URL: "https://capsule-pro-api.vercel.app"
      NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"
      NEXT_PUBLIC_ABLY_AUTH_URL: "https://capsule-pro-api.vercel.app/ably/auth"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:check

      - name: Run linting
        run: pnpm turbo typecheck --filter=./apps/app --filter=./apps/api --filter=./apps/web

      - name: Generate code for deployment
        run: |
          pnpm --filter @repo/cms build
          cd apps/web && npx basehub
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          BASEHUB_DRAFT: false

      - name: Run tests
        run: pnpm test
        continue-on-error: true

      - name: Build all apps
        run: pnpm turbo run build --filter=./apps/app --filter=./apps/api --filter=./apps/web

      - name: Load Vercel secrets
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            9eac2295-b47e-405e-b1cd-b43e00214c72 > VERCEL_TOKEN
            71c979f7-e59c-4370-872b-b43e002162d2 > VERCEL_ORG_ID
            34b541ba-6111-4f9d-9745-b43e002190da > VERCEL_APP_PROJECT_ID
            7b1173c2-ed67-4572-873a-b43e0021a4a5 > VERCEL_API_PROJECT_ID
            5e141ec7-b40d-4b83-8efa-b43e0021c700 > VERCEL_WEB_PROJECT_ID

      - name: Deploy to Vercel (App)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_APP_PROJECT_ID }}
          vercel-version: 53.1.0
          vercel-args: '--prod'

      - name: Deploy to Vercel (API)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_API_PROJECT_ID }}
          vercel-version: 53.1.0
          vercel-args: '--prod'

      - name: Deploy to Vercel (Web)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_WEB_PROJECT_ID }}
          vercel-version: 53.1.0
          vercel-args: '--prod'

  deploy-docs:
    runs-on: ubuntu-latest
    needs: check-dependabot
    if: needs.check-dependabot.outputs.has-failing-dependabot == 'false'
    env:
      NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
      SKIP_ENV_VALIDATION: true
      DATABASE_URL: "postgresql://dummy:***@localhost:5432/dummy"
      NEXT_PUBLIC_DOCS_URL: "https://capsule-pro-docs.vercel.app"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm turbo run build --filter=./apps/docs
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Load Vercel secrets
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            9eac2295-b47e-405e-b1cd-b43e00214c72 > VERCEL_TOKEN
            71c979f7-e59c-4370-872b-b43e002162d2 > VERCEL_ORG_ID
            e239cd88-7fb7-4c3b-ab42-b43e0021b4c8 > VERCEL_DOCS_PROJECT_ID

      - name: Deploy to Vercel (Docs)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_DOCS_PROJECT_ID }}
          vercel-version: 53.1.0
          vercel-args: '--prod'

  notify-failing-dependabot:
    runs-on: ubuntu-latest
    needs: check-dependabot
    if: needs.check-dependabot.outputs.has-failing-dependabot == 'true'

    steps:
      - name: Notify about failing Dependabot PRs
        run: |
          echo "🚫 Deployment blocked by failing Dependabot PRs"
          echo "Please review and fix the failing Dependabot PRs before deploying"
          gh pr list --author dependabot[bot] --json number,title,statusCheckRollup --template '{{range .}}{{tablerow .number .title (join .statusCheckRollup " ")}}{{end}}'
        env:
          GITHUB_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}
