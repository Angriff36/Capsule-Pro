name: Deploy

# Production only. Triggered manually via Actions → Deploy → Run workflow.
# Git pushes do not deploy (vercel.json ignoreCommand skips Vercel Git builds).
#
# Pipeline follows canonical Vercel CI/CD:
#   https://vercel.com/docs/git/vercel-for-github#using-github-actions
#   vercel pull   --yes --environment=production --token=$VERCEL_TOKEN
#   vercel build  --prod                          --token=$VERCEL_TOKEN
#   vercel deploy --prebuilt --prod               --token=$VERCEL_TOKEN
#
# `vercel pull` writes .vercel/.env.production.local with real per-project
# secrets from Vercel project settings; `vercel build` auto-loads them.
# Do NOT mirror DATABASE_URL / CLERK_* / STRIPE_* / etc. in GitHub Actions env.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-manual
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read   # for `gh pr list` in check-dependabot

env:
  # Turbo remote cache (turbo.json declares remoteCache + signature).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

  # Vercel team — shared across all deploy steps.
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # GitHub Packages auth for pnpm install.
  NPM_TOKEN: ${{ secrets.PKG_AUTH_TOKEN }}

  # Per-project Vercel IDs (resolved per matrix entry in deploy job):
  #   VERCEL_PROJECT_ID_APP  → capsule-pro-app
  #   VERCEL_PROJECT_ID_API  → capsule-pro-api
  #   VERCEL_PROJECT_ID_DOCS → capsule-pro-docs
  #   VERCEL_PROJECT_ID_WEB  → capsule-pro-web

jobs:
  # --- Gate 1: block on failing Dependabot PRs ----------------------------
  check-dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has-failing: ${{ steps.check.outputs.has-failing }}
    steps:
      - name: Count failing Dependabot PRs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          failing=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author 'dependabot[bot]' \
            --json statusCheckRollup \
            --jq '[.[] | select(.statusCheckRollup[]?.status == "FAILURE" or .statusCheckRollup[]?.status == "ERROR")] | length')
          if [ "${failing:-0}" -gt 0 ]; then
            echo "has-failing=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Deployment blocked: $failing Dependabot PR(s) with failing checks."
          else
            echo "has-failing=false" >> "$GITHUB_OUTPUT"
          fi

  notify-failing-dependabot:
    needs: check-dependabot
    if: needs.check-dependabot.outputs.has-failing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report failing Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::error::Deployment blocked by failing Dependabot PRs."
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author 'dependabot[bot]' \
            --json number,title,url \
            --template '{{range .}}#{{.number}} {{.title}} — {{.url}}{{"\n"}}{{end}}'
          exit 1

  # --- Gate 2: typecheck / lint / test before any deploy ------------------
  quality:
    needs: check-dependabot
    if: needs.check-dependabot.outputs.has-failing == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SKIP_ENV_VALIDATION: 'true'
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: |
          bash scripts/ensure-github-packages-npmrc.sh
          pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:check

      - name: Typecheck
        run: pnpm check

      - name: Lint explicit any
        run: pnpm lint:any

      - name: Tests
        run: pnpm test

  # --- Deploy: one job, one matrix entry per Vercel project ---------------
  deploy:
    needs: [check-dependabot, quality]
    if: needs.check-dependabot.outputs.has-failing == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: ${{ matrix.advisory }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: app
            dir: apps/app
            project_id_secret: VERCEL_PROJECT_ID_APP
            needs_basehub: false
            advisory: false
          - project: api
            dir: apps/api
            project_id_secret: VERCEL_PROJECT_ID_API
            needs_basehub: false
            advisory: false
          - project: docs
            dir: apps/docs
            project_id_secret: VERCEL_PROJECT_ID_DOCS
            needs_basehub: false
            advisory: false
          # Web depends on @repo/cms. Advisory: basehub type drift may break
          # the build but should not block the rest of production.
          - project: web
            dir: apps/web
            project_id_secret: VERCEL_PROJECT_ID_WEB
            needs_basehub: true
            advisory: true

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: |
          bash scripts/ensure-github-packages-npmrc.sh
          pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@53.1.0

      # vercel pull reads VERCEL_ORG_ID + VERCEL_PROJECT_ID from env and
      # writes .vercel/.env.production.local for vercel build to consume.
      - name: Pull Vercel environment
        working-directory: ${{ matrix.dir }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      # Web only: basehub codegen must run before vercel build.
      - name: Generate CMS code (web)
        if: matrix.needs_basehub
        working-directory: ${{ matrix.dir }}
        env:
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          BASEHUB_DRAFT: 'false'
        run: |
          pnpm --filter @repo/cms build
          npx basehub

      # vercel build runs the project's buildCommand (turbo-aware) and writes
      # .vercel/output. It auto-loads .vercel/.env.production.local — no
      # manual NEXT_PUBLIC_* export needed.
      - name: Build (vercel build)
        working-directory: ${{ matrix.dir }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts
        working-directory: ${{ matrix.dir }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
