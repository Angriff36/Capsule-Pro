name: Deploy

# Production only. Triggered manually via Actions → Deploy → Run workflow.
# Git pushes do not deploy (vercel.json ignoreCommand skips Vercel Git builds).
#
# Deploy through Vercel's remote builder. Runtime secrets live in Vercel project settings.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-manual
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  NPM_TOKEN: ${{ github.token }}

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_APP }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@53.1.0

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ github.token }}

      - name: Deploy app to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ github.token }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes \
            --build-env SKIP_ENV_VALIDATION=true \
            --build-env PKG_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NPM_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NODE_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env TURBO_REMOTE_CACHE_SIGNATURE_KEY="$TURBO_REMOTE_CACHE_SIGNATURE_KEY" \
            --token "$VERCEL_TOKEN"

  deploy-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@53.1.0

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ github.token }}

      - name: Deploy API to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ github.token }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes \
            --build-env SKIP_ENV_VALIDATION=true \
            --build-env PKG_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NPM_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NODE_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env TURBO_REMOTE_CACHE_SIGNATURE_KEY="$TURBO_REMOTE_CACHE_SIGNATURE_KEY" \
            --token "$VERCEL_TOKEN"

  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@53.1.0

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ github.token }}

      - name: Deploy web to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ github.token }}
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes \
            --build-env SKIP_ENV_VALIDATION=true \
            --build-env PKG_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NPM_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NODE_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env BASEHUB_TOKEN="$BASEHUB_TOKEN" \
            --build-env TURBO_REMOTE_CACHE_SIGNATURE_KEY="$TURBO_REMOTE_CACHE_SIGNATURE_KEY" \
            --token "$VERCEL_TOKEN"

  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@53.1.0

      - name: Install dependencies
        run: bash scripts/ensure-github-packages-npmrc.sh && pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ github.token }}

      - name: Deploy docs to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ github.token }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes \
            --build-env SKIP_ENV_VALIDATION=true \
            --build-env PKG_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NPM_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env NODE_AUTH_TOKEN="$GITHUB_PACKAGES_TOKEN" \
            --build-env TURBO_REMOTE_CACHE_SIGNATURE_KEY="$TURBO_REMOTE_CACHE_SIGNATURE_KEY" \
            --token "$VERCEL_TOKEN"
