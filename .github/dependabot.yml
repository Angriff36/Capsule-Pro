version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    # Majors are no longer blanket-ignored (that is how upgrades become
    # quarter-long projects). They arrive as ONE grouped PR to review or
    # close — visible on a schedule instead of invisible forever.
    groups:
      major-updates:
        update-types:
          - major
        patterns:
          - "*"
      minor-and-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
