# Manifest CLI configuration — https://manifest-b1e8623f.mintlify.app/cli/configuration
#
# Config is OPTIONAL: the CLI has built-in defaults and Capsule's wrapper scripts
# pass explicit flags (which OVERRIDE this file). This file documents and centralizes
# the project's canonical paths + nextjs projection options so the values live in ONE
# place instead of being implicit in scripts.
#
# IMPORTANT — current reality (do not assume this file alone drives generation):
#  - `pnpm manifest:compile` (manifest/scripts/compile.mjs) imports the IR compiler
#    DIRECTLY and hand-rolls .manifest discovery to dodge a CLI `--glob` "last file wins"
#    bug — it does NOT read this config.
#  - `pnpm manifest:generate` (manifest/scripts/generate.mjs) shells `pnpm exec manifest
#    generate <ir> --projection nextjs --surface route --output <staging>` with EXPLICIT
#    flags, then post-processes (domain remap + accessor resolution) and writes a singular
#    dispatcher. Those explicit flags override `src`/`output`/projection settings here.
#  So today this config is descriptive/forward-looking; wiring the scripts to consume it
#  is tracked in manifest/task_plan.md §Phase-7. Values below mirror the scripts exactly.

$schema: https://manifest.dev/config.schema.json

# Capsule-owned .manifest sources (manifest/source/*.manifest). compile.mjs reads this dir.
src: manifest/source/**/*.manifest

# Compiled merged IR output dir. The canonical merged IR is manifest/ir/kitchen.ir.json.
output: manifest/ir/

# Prisma schema used for validation / accessor cross-checks.
prismaSchema: packages/database/prisma/schema.prisma

projections:
  nextjs:
    # Generated read routes land under apps/api/app/api/ (after generate.mjs domain remap).
    output: apps/api/app/api/
    options:
      # Auth: Clerk (auth().protect() on protected routes) — constitution / AGENTS.md.
      authProvider: clerk
      # App-local DB + runtime + response import paths used by generated routes.
      databaseImportPath: "@repo/database"
      # Tenant scoping + soft-delete are enforced on read surfaces.
      includeTenantFilter: true
      includeSoftDeleteFilter: true
      # Governed command writes go through the SINGULAR dispatcher (constitution §6),
      # never concrete per-command routes:
      dispatcher: apps/api/app/api/manifest/[entity]/commands/[command]/route.ts
  prisma:
    options:
      # Schema placement is resolved by the policy in
      # manifest/schema-placement.rules.json (decision order: override -> sourceFile
      # rule -> name pattern -> shared tenant infra -> FAIL). Never falls back to public.
      # See docs/database/SCHEMA_PLACEMENT_POLICY.md.
      placementPolicy: manifest/schema-placement.rules.json
      multiSchema:
        # entitySchema = OVERRIDES ONLY (decision rule #1), i.e. exceptions:
        #   - hand-preserved (non-Manifest) models with no .manifest source file
        #   - Manifest entities authored in multi-domain files (staff-logistics-extended,
        #     crm-admin-extended, events-extended, equipment) where one file rule can't be right
        #   - documented ambiguous entities (e.g. Budget -> tenant_accounting)
        # Everything else is placed by the policy rules — do NOT re-add policy-derivable entries here.
        entitySchema:
          Account: platform
          ActionMilestone: tenant_staff
          ActivityFeed: tenant_admin
          AdminChatMessage: tenant_admin
          AdminChatThread: tenant_admin
          ApprovalHistory: tenant_staff
          Budget: tenant_accounting
          CycleCountAuditLog: tenant_inventory
          Department: tenant_staff
          DisciplinaryAction: tenant_staff
          Document: tenant
          EmailLog: tenant_admin
          EmployeeBankAccount: tenant_staff
          EmployeeLocation: tenant_staff
          EmployeePayrollPrefs: tenant_staff
          EmployeePin: tenant_staff
          EmployeePinAccessLog: tenant_staff
          EmployeeTaxInfo: tenant_staff
          Equipment: tenant_kitchen
          GoodshuffleConfig: tenant_admin
          GoodshuffleEventSync: tenant_admin
          GoodshuffleInventorySync: tenant_admin
          GoodshuffleInvoiceSync: tenant_admin
          Location: tenant
          MaintenanceWorkOrder: tenant_facilities
          ManifestCommandTelemetry: tenant_admin
          ManifestEntity: tenant
          ManifestIdempotency: tenant
          NowstaConfig: tenant_admin
          NowstaEmployeeMapping: tenant_admin
          NowstaShiftSync: tenant_admin
          OnboardingCompletion: tenant_staff
          OnboardingTask: tenant_staff
          OpenShift: tenant_staff
          OutboundWebhook: tenant_admin
          OutboxEvent: tenant
          PaymentRefundAttempt: tenant_accounting
          PayrollAuditLog: tenant_staff
          PerformanceReview: tenant_staff
          PreventiveMaintenanceSchedule: tenant_facilities
          ProviderSync: tenant_admin
          RateLimitEvent: tenant_admin
          RateLimitUsage: tenant_admin
          Report: tenant_admin
          Role: tenant_staff
          SentryFixJob: platform
          SupplierSyncLog: tenant_inventory
          TaxConfiguration: tenant_staff
          Tenant: platform
          TimecardApproval: tenant_staff
          TipPool: tenant_staff
          TrainingCompletion: tenant_staff
          UserPreference: tenant_staff
          Venue: tenant
          WasteReason: core
