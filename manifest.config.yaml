# Manifest CLI configuration — https://manifest-b1e8623f.mintlify.app/cli/configuration
#
# AUTHORITATIVE for Capsule Pro Manifest paths, projection options, and accessor naming.
# Scripts consume this via manifest/scripts/read-config.mjs — do NOT duplicate maps in .mjs.
#
# Consumed by: compile.mjs (paths), generate.mjs (paths/dispatcher/readRoutes),
#   entity-domain-map.mjs (entityToPrismaModel + accessorNames), build-prisma-store-options.mjs,
#   check-accessor-config.mjs (CI gate).
#
# CI: pnpm manifest:check-accessor-config:strict

# Local bundled schema (the public manifest.dev URL is dead; the CLI validates against this
# bundled file regardless — the path here is for editor IntelliSense only).
$schema: ./node_modules/@angriff36/manifest/docs/spec/config/manifest.config.schema.json

# Capsule-owned .manifest sources (manifest/source/*.manifest). compile.mjs reads this dir.
src: manifest/source/**/*.manifest

# Compiled merged IR output dir. The canonical merged IR is manifest/ir/kitchen.ir.json.
output: manifest/ir/

# Prisma schema used for validation / accessor cross-checks. Points at the
# Manifest-generated half of the multi-file schema folder (the audits cross-check
# only Manifest entities; hand-owned infra.prisma is not IR-derived).
prismaSchema: packages/database/prisma/schema/manifest.prisma

projections:
  nextjs:
    # Generated read routes land under apps/api/app/api/ (after generate.mjs domain remap).
    output: apps/api/app/api/
    # NOTE: the projection is selected by THIS key name (`nextjs`); Manifest's config
    # schema has no field for projection name or surface strings (route/detail) — those
    # are CLI/wrapper internals. See https://manifest-b1e8623f.mintlify.app/cli/configuration
    options:
      # Auth: Clerk (auth().protect() on protected routes) — constitution / AGENTS.md.
      authProvider: clerk
      # Import the Clerk auth() helper from the repo wrapper (@repo/auth/server),
      # NOT the raw @clerk/nextjs package (which has no v5 auth export). See generator.js.
      authImportPath: "@repo/auth/server"
      # App-local DB client used by generated read routes.
      databaseImportPath: "@repo/database"
      # App Router base directory. Route pathHints are emitted relative to repo root
      # as <appDir>/<routeSegment>/(list|[id])/route.ts, so this is the full prefix.
      appDir: apps/api/app/api
      # Tenant scoping + soft-delete are enforced on read surfaces (field-aware in 3.0.0:
      # only entities that actually carry tenantId/deletedAt columns get the filter).
      includeTenantFilter: true
      includeSoftDeleteFilter: true
      # Direct DB read routes (GET list + detail). Flip enabled:false to suppress reads.
      readRoutes:
        enabled: true
        directDbReads: true
      # Governed command writes go through the SINGULAR dispatcher (constitution §6).
      # Capsule owns a CUSTOM dispatcher template (auth/tenant resolution + runManifestCommand),
      # so native dispatcher emission is DISABLED; generate.mjs writes the template itself.
      # executorImportPath/Name still name the real module (read by generate.mjs).
      dispatcher:
        enabled: false
        path: apps/api/app/api/manifest/[entity]/commands/[command]/route.ts
        executionMode: externalExecutor
        executorImportPath: "@/lib/manifest/execute-command"
        executorImportName: runManifestCommand
      # Per-command concrete routes are never emitted (dispatcher is canonical).
      concreteCommandRoutes:
        enabled: false
      # Capsule hand-writes its runtime factory / response / db companions.
      emitCompanions: false
      # Per-entity URL path segments (replaces the old generate.mjs domain remap).
      # Single source of truth for route paths — entity-domain-map.mjs derives
      # ENTITY_DOMAIN_MAP from this block for the client/hook generators.
      routeSegments:
        PrepTask: "kitchen/prep-tasks"
        PrepTaskPlanWorkflow: "kitchen/prep-task-plan-workflows"
        KitchenTask: "kitchen/kitchen-tasks"
        Recipe: "kitchen/recipes"
