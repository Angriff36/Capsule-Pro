  # Manifest IR → Prisma store metadata (keys by IR entity name, not Prisma model name).
  # Runtime authority: manifest-prisma-store-metadata.generated.ts via prisma-store-registry.generated.ts.
  # Options bag: manifest/scripts/prisma-store-options.generated.json (built from THIS config).
  prisma-store:
    output: manifest/generated/runtime/
    options:
      provider: postgresql
      naming: snake_case
      metadataOutput: manifest-prisma-store-metadata.generated.ts
      registryOutput: prisma-store-registry.generated.ts
      # IR entity → Prisma model (only when the model name genuinely differs from
      # the IR entity name). Under the native prisma projection (naming:
      # snake_case) the model name IS the IR entity name and the @map handles the
      # snake_case table, so entities whose model == their IR name need NO bridge
      # (they resolve via naive camelCase). Only these 5 collapse an IR entity
      # onto a differently-named shared model.
      entityToPrismaModel:
        EventImportWorkflow: EventImport
        LogisticsRoute: DeliveryRoute
        EventTimelineItem: EventTimeline
        QACorrectiveAction: CorrectiveAction
        QATemperatureLog: TemperatureLog
      # IR entity → Prisma client delegate (must match live schema; validated in CI).
      accessorNames:
        EventImportWorkflow: eventImport
        LogisticsRoute: deliveryRoute
        EventTimelineItem: eventTimeline
        QACorrectiveAction: correctiveAction
        QATemperatureLog: temperatureLog
