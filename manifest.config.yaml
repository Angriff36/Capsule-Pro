# Manifest CLI configuration — https://manifest-b1e8623f.mintlify.app/cli/configuration
#
# AUTHORITATIVE for Capsule Pro Manifest paths, projection options, and accessor naming.
# Scripts consume this via manifest/scripts/read-config.mjs — do NOT duplicate maps in .mjs.
#
# Consumed by: compile.mjs (paths), generate.mjs (paths/dispatcher/readRoutes),
#   entity-domain-map.mjs (entityToPrismaModel + accessorNames), build-prisma-store-options.mjs,
#   check-accessor-config.mjs (CI gate).
#
# CI: pnpm manifest:check-accessor-config:strict

$schema: https://manifest.dev/config.schema.json

# Capsule-owned .manifest sources (manifest/source/*.manifest). compile.mjs reads this dir.
src: manifest/source/**/*.manifest

# Compiled merged IR output dir. The canonical merged IR is manifest/ir/kitchen.ir.json.
output: manifest/ir/

# Prisma schema used for validation / accessor cross-checks.
prismaSchema: packages/database/prisma/schema.prisma

projections:
  nextjs:
    # Generated read routes land under apps/api/app/api/ (after generate.mjs domain remap).
    output: apps/api/app/api/
    # NOTE: the projection is selected by THIS key name (`nextjs`); Manifest's config
    # schema has no field for projection name or surface strings (route/detail) — those
    # are CLI/wrapper internals. See https://manifest-b1e8623f.mintlify.app/cli/configuration
    options:
      # ts.types datetime scalars → ISO `string` (Capsule wire convention:
      # manifest/capsule-conventions.json). Default 'date' emits `Date`, which is a
      # runtime lie over JSON. With this set, the stock `--surface types` output is
      # directly usable — the old scalar-type-map.mjs `toTsTypes` post-process retired.
      dateSerialization: iso-string
      # Auth: Clerk (auth().protect() on protected routes) — constitution / AGENTS.md.
      authProvider: clerk
      # Import the Clerk `auth()` helper from the repo wrapper (@repo/auth/server),
      # NOT the raw `@clerk/nextjs` package. The nextjs projection defaults
      # authImportPath to "@/lib/auth", which (per generator.js generateAuthImport)
      # collapses to "@clerk/nextjs" — a module that does NOT export `auth` in Clerk
      # v5+ (it lives under @clerk/nextjs/server), so the generated list routes would
      # fail typecheck. Setting it explicitly keeps generated reads on the repo wrapper
      # and the regen drift gate at zero. See generator.js:144-148.
      authImportPath: "@repo/auth/server"
      # App-local DB + runtime + response import paths used by generated routes.
      databaseImportPath: "@repo/database"
      # App Router base directory. generate.mjs derives its staged-route prefix from this
      # instead of hardcoding "apps/api/app/api/".
      appDir: apps/api/app/api
      # Tenant scoping + soft-delete are enforced on read surfaces.
      includeTenantFilter: true
      includeSoftDeleteFilter: true
      # Direct DB read routes (GET list + detail). Defaults shown; flip enabled:false to
      # suppress read-route generation entirely (honored by both the CLI and generate.mjs).
      readRoutes:
        enabled: true
        directDbReads: true
      # Governed command writes go through the SINGULAR dispatcher (constitution §6),
      # never concrete per-command routes:
      dispatcher:
        enabled: true
        path: apps/api/app/api/manifest/[entity]/commands/[command]/route.ts
        # Capsule uses a CUSTOM dispatcher shape (its own auth/tenant resolution +
        # runManifestCommand call), so the CLI can't generate it — generate.mjs writes
        # the template. But the executor import path/name ARE consumed from here, so
        # they must name the REAL module (not the CLI default @/lib/manifest-executor,
        # which does not exist in this repo).
        executionMode: externalExecutor
        executorImportPath: "@/lib/manifest/execute-command"
        executorImportName: runManifestCommand
  # Canonical Routes projection → manifest/runtime/routes.manifest.json + routes.ts
  # (generated by manifest/scripts/generate-route-manifest.ts).
  routes:
    options:
      # Base path prefix prepended to every route entry.
      basePath: /api
  prisma:
    options:
      provider: postgresql
      naming: snake_case
      # Multi-schema placement is driven by manifest/schema-placement.rules.json
      # (the policy engine) + entity-to-schema overrides in scripts.
      # The CLI's config schema (v2.2.0) does not yet validate multiSchema under
      # prisma.options — see prisma-projection.schema.json for the full spec.
      # When the CLI catches up, add multiSchema here to centralize placement.
  # Manifest IR → Prisma store metadata (keys by IR entity name, not Prisma model name).
  # Runtime authority: manifest-prisma-store-metadata.generated.ts via prisma-store-registry.generated.ts.
  # Options bag: manifest/scripts/prisma-store-options.generated.json (built from THIS config).
  prisma-store:
    output: manifest/generated/runtime/
    options:
      provider: postgresql
      naming: snake_case
      metadataOutput: manifest-prisma-store-metadata.generated.ts
      registryOutput: prisma-store-registry.generated.ts
      # IR entity → Prisma model (when model name differs from IR entity name).
      entityToPrismaModel:
        EventImportWorkflow: EventImport
        BankAccount: EmployeeBankAccount
        LogisticsRoute: DeliveryRoute
        Document: documents
        SmsAutomationRule: sms_automation_rules
        EventTimelineItem: EventTimeline
        StorageLocation: storage_locations
        BulkCombineRule: bulk_combine_rules
        MethodVideo: method_videos
        PrepListImport: prep_list_imports
        QACorrectiveAction: CorrectiveAction
        QATemperatureLog: TemperatureLog
        TaskBundleItem: task_bundle_items
        TaskBundle: task_bundles
        OpenShift: open_shifts
      # IR entity → Prisma client delegate (must match live schema; validated in CI).
      accessorNames:
        EventImportWorkflow: eventImport
        BankAccount: employeeBankAccount
        LogisticsRoute: deliveryRoute
        Document: documents
        SmsAutomationRule: sms_automation_rules
        EventTimelineItem: eventTimeline
        StorageLocation: storage_locations
        BulkCombineRule: bulk_combine_rules
        MethodVideo: method_videos
        PrepListImport: prep_list_imports
        QACorrectiveAction: correctiveAction
        QATemperatureLog: temperatureLog
        TaskBundleItem: task_bundle_items
        TaskBundle: task_bundles
        OpenShift: open_shifts
