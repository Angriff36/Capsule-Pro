      # These are genuine cross-model aliases (an entity's routes read from a
      # differently-named Prisma model/delegate). The 9 snake_case overrides that
      # used to live here (TaskBundle→task_bundles, StorageLocation→storage_locations,
      # OpenShift→open_shifts, Document→documents, SmsAutomationRule→sms_automation_rules,
      # BulkCombineRule, MethodVideo, PrepListImport, TaskBundleItem) were removed: the
      # Manifest projection now emits those models as PascalCase (TaskBundle, …), so the
      # real Prisma delegate is camelCase (taskBundle, …). Leaving the snake overrides
      # pointed generated read routes at undefined delegates. Default (camelCase entity)
      # is now correct for them.
      accessorNames:
        EventImportWorkflow: "eventImport"
        BankAccount: "employeeBankAccount"
        EventTimelineItem: "eventTimeline"
        QACorrectiveAction: "correctiveAction"
        QATemperatureLog: "temperatureLog"
        LogisticsRoute: "deliveryRoute"
  # Canonical Routes projection → manifest/runtime/routes.manifest.json + routes.ts
  # (generated by manifest/scripts/generate-route-manifest.ts).
  routes:
    options:
      # Base path prefix prepended to every route entry.
      basePath: /api
  prisma:
    # Native multi-schema schema generation (manifest >= 2.22.0). Manifest OWNS
    # packages/database/prisma/schema/manifest.prisma (the Manifest half of the
    # Prisma 7 multi-file schema folder; hand-owned infra.prisma sits beside it).
    # Options lifted from manifest/prisma-options.config.json, PRUNED to the current
    # IR (drifted/stale entries removed) and with literal @default(...) field attrs
    # dropped (the IR emits those natively).
    #
    # output dir stays packages/database/prisma so the prisma.config.ts companion
    # (pathHint "prisma.config.ts") keeps its home; options.output carries the
    # schema/ subdir so only the schema file lands in the folder.
    output: packages/database/prisma
    options:
      output: "schema/manifest.prisma"
      provider: "postgresql"
      relationMode: "prisma"
      naming: "snake_case"
      autoBackRelations: true
      # Explicit physical table names for models where the `naming: snake_case`
      # auto-pluralizer diverged from the real database table (verified against
      # packages/database/prisma/migrations). Without these the generated @@map
      # pointed at non-existent tables (e.g. User->users, Equipment->equipments,
      # IoTAlert->io_t_alerts), so every query on these 32 models failed at runtime.
      # tableMappings wins over the auto-naming convention; model names (and thus the
      # Prisma delegates + relations) are unchanged.
      tableMappings:
        AdminTaskDevMeta: "admin_task_dev_meta"
        AiEventSetupSession: "AiEventSetupSession"
        AlertsConfig: "alerts_config"
        AutomatedFollowup: "AutomatedFollowup"
        Budget: "Budget"
        Deal: "Deal"
        EmployeeAvailability: "employee_availability"
        EmployeeDeduction: "EmployeeDeduction"
        EntityVersion: "EntityVersion"
        Equipment: "equipment"
        EventProfitability: "event_profitability"
        EventStaff: "event_staff"
        EventTimeline: "event_timeline"
        EventWaitlistEntry: "EventWaitlistEntry"
        FacilitySchedule: "FacilitySchedule"
        FacilityWorkOrder: "FacilityWorkOrder"
        InventoryStock: "inventory_stock"
        IoTAlert: "iot_alerts"
        KitchenTaskClaim: "task_claims"
        KitchenTaskProgress: "task_progress"
        LogisticsDispatch: "LogisticsDispatch"
        OverrideAudit: "override_audit"
        PayrollApprovalHistory: "payroll_approval_history"
        PerformancePrediction: "PerformancePrediction"
        SampleData: "SampleData"
        StaffPerformance: "StaffPerformance"
        TimeOffRequest: "employee_time_off_requests"
        User: "employees"
        Vendor: "Vendor"
        VersionApproval: "VersionApproval"
        VersionedEntity: "VersionedEntity"
        WorkforceOptimization: "WorkforceOptimization"
      generator:
        provider: "prisma-client"
        # Resolved relative to the schema FOLDER (prisma/schema/), so two levels up
        # keeps the client at packages/database/generated (imported as @repo/database
        # ./generated/client). Was ../generated when the schema was a single file at
        # prisma/schema.prisma.
        output: "../../generated"
        moduleFormat: "esm"
        generatedFileExtension: "ts"
        importFileExtension: "ts"
      multiSchema:
        enabled: true
        defaultSchema: "public"
        schemas: ["core", "platform", "public", "tenant", "tenant_accounting", "tenant_admin", "tenant_crm", "tenant_events", "tenant_facilities", "tenant_inventory", "tenant_kitchen", "tenant_logistics", "tenant_staff"]
